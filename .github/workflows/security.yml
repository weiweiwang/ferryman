name: Security

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run repository secret scanner
        run: python3 scripts/security/secret_scan.py --repo

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  policy:
    name: Repository Policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify root governance files
        run: |
          test -f README.md
          test -f LICENSE
          test -f NOTICE
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md

      - name: Verify package metadata
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          package = json.loads(Path("frontend/package.json").read_text())
          assert package.get("license") == "Apache-2.0"
          cargo = Path("frontend/src-tauri/Cargo.toml").read_text()
          assert 'license = "Apache-2.0"' in cargo
          PY
